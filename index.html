<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Temp Tracker</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="authPanel" class="panel input-panel">
        <p class="label">Код доступа</p>
        <input
          id="authCodeInput"
          class="auth-input"
          type="password"
          autocomplete="current-password"
          placeholder="Введите код один раз"
        />
        <button id="authBtn" class="submit-btn" type="button">Войти</button>
        <p id="authMessage" class="status-message" aria-live="polite"></p>
      </section>

      <div id="trackerPanel">
        <section class="panel input-panel">
          <div class="temperature-row">
            <button id="decreaseBtn" class="arrow-btn" type="button" aria-label="Уменьшить">
              ▼
            </button>
            <output id="temperatureValue" class="temperature-value">36.6</output>
            <button id="increaseBtn" class="arrow-btn" type="button" aria-label="Увеличить">
              ▲
            </button>
          </div>
          <input
            id="temperatureSlider"
            class="temperature-slider"
            type="range"
            min="34"
            max="42"
            step="0.1"
            value="36.6"
            aria-label="Ползунок температуры"
          />
          <button id="submitBtn" class="submit-btn" type="button">Отправить данные</button>
        </section>

        <p id="statusMessage" class="status-message status-between-panels" aria-live="polite"></p>

        <section class="panel history-panel">
          <div class="history-header">
            <h2 class="history-title">История</h2>
            <button
              type="button"
              class="copy-btn copy-btn-icon"
              data-copy-history
              aria-label="Скопировать историю"
              title="Скопировать историю"
            >
              <span class="copy-icon" aria-hidden="true">
                <span class="copy-sheet copy-sheet-back"></span>
                <span class="copy-sheet copy-sheet-front"></span>
              </span>
              <span class="copy-done" aria-hidden="true">✓</span>
            </button>
          </div>
          <ul id="historyList" class="history-list"></ul>
          <div class="history-footer">
            <span aria-hidden="true"></span>
            <button
              type="button"
              class="copy-btn copy-btn-icon"
              data-copy-history
              aria-label="Скопировать историю"
              title="Скопировать историю"
            >
              <span class="copy-icon" aria-hidden="true">
                <span class="copy-sheet copy-sheet-back"></span>
                <span class="copy-sheet copy-sheet-front"></span>
              </span>
              <span class="copy-done" aria-hidden="true">✓</span>
            </button>
          </div>
        </section>

        <footer class="app-footer">
          <button id="resetAccessBtn" class="ghost-btn" type="button">Сменить код доступа</button>
        </footer>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
